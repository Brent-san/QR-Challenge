<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <style>
    .attribution { 
      font-size: 11px; 
      text-align: center; 
      position: absolute;
      top: 10px;
      width: 100%;
    }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      background: rgb(213, 225, 239);
      display: flex;                    /* Added */
      justify-content: center;          /* Added - centers horizontally */
      align-items: center;              /* Added - centers vertically */
      min-height: 100vh;                /* Added - full viewport height */
      margin: 0;                        /* Added - removes default margin */
    }

    .container {
      background: white;
      border-radius: 15px;              /* Increased for better look */
      width: 260px;                   /* Increased width */
      padding: 15px;                    /* Added padding */
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);  /* Added shadow */
    }

    .container-flex {
      text-align: center;               /* Centers text */
    }

    img {
      width: 100%;                      /* Makes image responsive */
      border-radius: 10px;
    }

    .first-text {
      font-size: 21px;
      font-weight: bold;
      color: rgb(31, 49, 79);
      margin: 15px 0;
      padding: 0 10px;
      line-height: 120%;  
      letter-spacing: 0px;
    }

    .second-text {
      font-size: 15px;
      color: rgb(104, 119, 141);
      margin: 10px 0 20px 0;
      padding: 0 10px;
      line-height: 140%;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Brent</a>.
  </div>

  <div class="container">
    <div class="container-flex">
      <img src="images/image-qr-code.png" alt="QR Code">
      <p class="first-text">Improve your front-end skills by building projects</p>
      <p class="second-text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  </div>
</body>
</html>
